<!DOCTYPE html>
<html>

    <style>

        html, body, .c {
            height: 100%;
        }

        .c {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;

        }

        
    </style>

    <body>
        <div class="c">
            <img id="d" src="diskussion.png" />
            <img id="u" src="ueber.png" />
            <img id="b" src="dynamik.png" />
        </div>
    </body>

    <script>
        const files = {
            "d": ["diskussion.png", "draht.png", "droge.png", "drum.png", "dynamik.png"],
            "u": ["ueber.png", "und.png", "unter.png", "unterstuetzt.png"],
            "b": ["bass.png", "bauweise.png", "beats.png", "begeisterung.png", "bewegung.png"]
        },
        keys = Object.keys(files);

        function r(max) {
            return Math.floor(Math.random() * (Math.floor(max) - 1));
        }

        let lastK = -1;

        setInterval(() => {
            let k;
            do {
                k = keys[r(keys.length + 1)];
            } while (k === lastK);
            lastK = k;
            //Object.keys(files).forEach((k) => {
                const ar = r(files[k].length + 1)
                document.getElementById(k).src = files[k][ar]
            //});
        }, 3000);
    </script>
</html>
